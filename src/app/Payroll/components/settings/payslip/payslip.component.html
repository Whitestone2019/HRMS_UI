<div class="payslip-container">
  <h2>Download Payslip</h2>

  <!-- Loading Overlay -->
  <div class="loading-overlay" *ngIf="isDownloading">
    <div class="loading-spinner"></div>
    <p>Generating payslip...</p>
  </div>

  <!-- Employee Display - Always shown as a text box -->
  <div class="form-group">
    <label>Employee</label>
    <div class="employee-input-wrapper">
      <input 
        type="text" 
        [value]="employeeDisplay" 
        class="employee-input" 
        readonly
        disabled
      >
      <div class="input-icon">👤</div>
    </div>
    <small class="text-muted">
    </small>
  </div>

  <!-- Month Selection - Previous Month Only -->
  <div class="form-group">
    <label>Select Month (Previous Month Only)</label>
    <div class="month-select-wrapper">
      <select 
        [(ngModel)]="selectedMonth" 
        class="month-select"
      >
        <option *ngFor="let month of months" [value]="month.value">
          {{ month.value }}
        </option>
      </select>
      <div class="select-icon">▼</div>
    </div>
    <small class="text-muted">
      * Only previous month's payslip is available for download
    </small>
  </div>

  <!-- Download Button -->
  <div class="button-group">
    <button 
      (click)="downloadPayslip()" 
      [disabled]="!employeeId || !selectedMonth || isDownloading"
      class="download-btn"
      [class.loading]="isDownloading"
    >
      <span *ngIf="!isDownloading">Download Payslip</span>
      <span *ngIf="isDownloading">Processing...</span>
    </button>
  </div>
</div>
